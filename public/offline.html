<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión — LIMEBAL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: white; padding: 24px; text-align: center;
    }
    .ball { font-size: 5rem; margin-bottom: 24px; animation: bounce 1.2s ease-in-out infinite; }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-18px); }
    }
    h1 { font-size: 1.5rem; font-weight: 900; margin-bottom: 8px; }
    p  { color: #94a3b8; font-size: 0.9rem; max-width: 280px; line-height: 1.6; margin-bottom: 32px; }
    button {
      background: #f97316; color: white; border: none;
      padding: 14px 32px; border-radius: 12px;
      font-weight: 900; font-size: 0.9rem; cursor: pointer;
      box-shadow: 0 4px 20px rgba(249,115,22,0.4);
    }
    button:active { transform: scale(0.97); }
    .logo {
      position: fixed; bottom: 24px;
      font-size: 0.65rem; color: #334155;
      letter-spacing: 2px; text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="ball">🏀</div>
  <h1>Sin conexión</h1>
  <p>Necesitas internet para ver los datos en tiempo real de la liga. Conéctate y vuelve a intentarlo.</p>
  <button onclick="location.reload()">🔄 REINTENTAR</button>
  <div class="logo">Liga Metropolitana Eje Este</div>
</body>
</html>
